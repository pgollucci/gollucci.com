name: upgrade-main

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 14 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - name: Upgrade Deps
        uses: p6m7g8-actions/next-upgrade@main
        with:
          gh_token: ${{ secrets.P6_PGOLLUCCI_GH_TOKEN }}
          git_token: ${{ github.token }}
